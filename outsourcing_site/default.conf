server {
    listen 80;
    server_name _;

    # Static files only. /api/ is handled by the root nginx (see
    # ../../nginx/default.conf) which sits in front of this container.
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Caching for static assets
    location ~* \.(?:css|js|json|svg|png|jpg|jpeg|gif|ico|woff2?)$ {
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public";
    }
}
