version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: outsourcing_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data

  adminer:
    image: adminer
    restart: always
    ports:
      - "8080:8080"

  backend:
    build: ./site_backend
    environment:
      DB_NAME: outsourcing_dev
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: db
      DB_PORT: 5432
      JWT_SECRET: "dev_jwt_secret"
      SECRET_KEY_BASE: "dev_secret"
      PORT: 4000
    ports:
      - "4000:4000"
    depends_on:
      - db
    volumes:
      - ./site_backend:/app

volumes:
  db-data:
