map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

resolver 127.0.0.11 ipv6=off valid=10s;

# Gzip everything that is not already compressed and is large enough
# to be worth the CPU. The `gzip_static` directive is not enabled
# because we don't pre-compress; this is the dynamic path.
gzip on;
gzip_min_length 1024;
gzip_proxied any;
gzip_vary on;
gzip_types
    text/plain
    text/css
    text/xml
    text/javascript
    application/json
    application/javascript
    application/xml
    application/xml+rss
    image/svg+xml;

server {
    # Increase listen backlog so accept() doesn't fail under burst.
    # Each backend instance has num_acceptors=16; this gives us room
    # to absorb ~3-4 K concurrent connections before the kernel
    # queue starts rejecting. The OS-level net.core.somaxconn must
    # be at least this value, otherwise nginx silently caps it.
    listen 80 default_server backlog=4096;
    server_name _;

    set $backend_upstream http://backend:4000;
    set $ws_upstream http://backend:4001;
    set $frontend_upstream http://outsourcing_site:5173;

    # 10 MB body cap: most endpoints are <100 KB but file uploads
    # go up to 5 MB. The Plug.Parsers :length option enforces the
    # smaller per-route cap.
    client_max_body_size 10m;

    # ── 보안 헤더 ──
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src-elem 'self' 'unsafe-inline' https://cdn.jsdelivr.net; img-src 'self' data: blob: https:; connect-src 'self' ws: wss:; font-src 'self' https://cdn.jsdelivr.net data:; script-src 'self' 'unsafe-inline' 'unsafe-eval'; script-src-elem 'self' 'unsafe-inline' 'unsafe-eval';" always;

    # ── 서버 정보 숨김 ──
    server_tokens off;

    # ── CORS (preflight) ──
    location /api/ {
        if ($request_method = 'OPTIONS') {
            add_header Access-Control-Allow-Origin "$http_origin" always;
            add_header Access-Control-Allow-Methods "GET, POST, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Requested-With" always;
            add_header Access-Control-Max-Age 86400 always;
            add_header Content-Length 0;
            return 204;
        }

        rewrite ^/api/?(.*)$ /$1 break;
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Drop the `Connection: close` header so the upstream keeps
        # the TCP connection warm for the next request. This is the
        # single biggest win for small JSON payloads.
        proxy_set_header Connection        "";
        proxy_read_timeout 60s;
        # Buffer responses in nginx so the upstream socket is freed
        # quickly. With small JSON payloads the difference is small
        # but it helps when the backend is under brief back-pressure.
        proxy_buffering    on;
        proxy_buffer_size  8k;
        proxy_buffers      8 8k;
    }

    # Health check
    location = /healthz {
        access_log off;
        return 200 "ok\n";
    }

    # WebSocket proxy
    location /ws {
        proxy_pass $ws_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400s;
    }

    # Frontend
    location / {
        proxy_pass $frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;
        proxy_read_timeout 60s;
    }
}


