# Root reverse proxy. Listens on 80, forwards:
#   /api/  -> backend
#   /      -> outsourcing_site (Vite dev server)
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

resolver 127.0.0.11 ipv6=off valid=10s;

server {
    listen 80;
    server_name _;

    set $backend_upstream http://backend:4000;
    set $frontend_upstream http://outsourcing_site:5173;

    # Larger request bodies for file uploads (e.g. profile images, attachments)
    client_max_body_size 20m;

    # Proxy API requests to the backend. Strip the /api prefix so the
    # backend can mount routes at "/" (see proxy_pass trailing slash).
    location /api/ {
        rewrite ^/api/?(.*)$ /$1 break;
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";
        proxy_read_timeout 60s;
        proxy_buffering    off;
    }

    # Health check for the proxy itself.
    location = /healthz {
        access_log off;
        return 200 "ok\n";
    }

    # Everything else goes to the Vite dev server.
    location / {
        proxy_pass $frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;
        proxy_read_timeout 60s;
    }
}
